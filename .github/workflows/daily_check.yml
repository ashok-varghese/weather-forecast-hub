name: Daily Weather Contribution

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:     # Allows manual trigger for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run weather checker
        run: python api/weather_checker.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "22csel08@kristujayanti.com"
          git add weather_log.txt
          git commit -m "Automated Weather Log: $(date)" || echo "No changes to commit"
          git push
